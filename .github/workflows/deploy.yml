name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci
        working-directory: web

      - name: Copy data into public/
        run: |
          mkdir -p web/public/data
          cp data/listings.json web/public/data/listings.json
          cp data/resorts.json web/public/data/resorts.json

      - name: Build
        run: npm run build
        working-directory: web
        env:
          # When the repo is hosted at username.github.io/repo, Vite needs base=/repo/
          # Set in repo Actions variables as VITE_BASE if non-root.
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
